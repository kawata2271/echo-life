version: '3.9'

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB:       echolife
      POSTGRES_USER:     echolife
      POSTGRES_PASSWORD: echolife_dev
    ports: ["5432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./infra/db/rls.sql:/docker-entrypoint-initdb.d/02_rls.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U echolife"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    command: redis-server --appendonly yes
    volumes: [redis_data:/data]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  api-gateway:
    build: { context: ./services/api-gateway }
    environment:
      - DATABASE_URL=postgresql://echolife:echolife_dev@postgres:5432/echolife
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PORT=3001
    ports: ["3001:3001"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes: [./services/api-gateway/src:/app/src]
    command: npm run dev

  story-worker:
    build: { context: ./services/story-service }
    environment:
      - DATABASE_URL=postgresql://echolife:echolife_dev@postgres:5432/echolife
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - REDIS_URL=redis://redis:6379
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    command: npm run worker

volumes:
  postgres_data:
  redis_data:
